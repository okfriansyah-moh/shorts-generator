# Shorts Factory — Account Config: mrkimbum12
# Only specify keys that differ from global defaults in config/config.yaml.
# Everything here is deep-merged on top of the global config at runtime.
#
# paths.output_dir → output/mrkimbum12/
# paths.raw_dir    → raw/mrkimbum12/
# Drop source videos into raw/mrkimbum12/ to process for this account.

name: "mrkimbum12"
description: "Main Ninja Gaiden gameplay shorts channel"
enabled: true
min_score: 0.0    # 0.0 = publish all clips; raise to e.g. 0.7 for quality gate

video_type: "gameplay"

# ── Metadata ───────────────────────────────────────────────────────────────
metadata:
  language: "id"         # Bahasa Indonesia casual/conversational
  title_min_chars: 40
  title_max_chars: 60
  description_min_chars: 150
  description_max_chars: 300
  tag_count_min: 10
  tag_count_max: 15

# ── Upload schedule ────────────────────────────────────────────────────────
# Crontab: 0 9,13,18 * * * WIB  =  0 2,6,11 * * * UTC
scheduler:
  posts_per_day: 3
  preferred_hours: [2, 6, 11]  # UTC → 09:00, 13:00, 18:00 WIB (must match crontab)

# ── Channel branding ───────────────────────────────────────────────────────
channel:
  name: "mrkimbum12"
  hashtags:
    - "#ninjagaiden"
    - "#gaming"
    - "#shorts"
    - "#ninjagaidensigma"
  static_tags:
    - "ninja gaiden"
    - "ryu hayabusa"
    - "tecmo"
    - "team ninja"
    - "ninja gaiden sigma"

# ── Telegram notifications ─────────────────────────────────────────────────
# bot_token inherited from global config.yaml (shared bot across accounts)
telegram:
  chat_id: "-5208074363"   # "Shorts Video" group

# ── Compositor ─────────────────────────────────────────────────────────────
compositor:
  default_layout: "split"
  face_region: "bottom_left"

# ── Thumbnail style ────────────────────────────────────────────────────────
thumbnail:
  saturation_boost: 1.15
  contrast_boost: 1.10
  max_text_words: 3
  font_size: 72

# ── Renderer ───────────────────────────────────────────────────────────────
renderer:
  max_file_size_mb: 250  # >100 MB is acceptable for this channel; keep a hard cap at 250 MB

# ── TTS voice ──────────────────────────────────────────────────────────────
tts:
  voice: "en-US-AriaNeural"

# ── Scoring weights (gameplay-optimised) ──────────────────────────────────
scoring:
  weights:
    keyword: 3
    audio_energy: 2
    face_presence: 2
    scene_activity: 1
    sentence_density: 1
    image_quality: 2
  min_composite_score: 0.2

# ── Clip builder ───────────────────────────────────────────────────────────
clip_builder:
  max_clips_per_video: 15
  min_clips_per_video: 1
  target_duration_min: 45
  target_duration_max: 60

# ── Platforms ──────────────────────────────────────────────────────────────
platforms:

  youtube:
    enabled: true
    credentials: "youtube_credentials.json"   # relative to this folder
    initial_visibility: "unlisted"            # unlisted → public after delay
    public_delay_minutes: 30

  tiktok:
    enabled: false
    credentials: "tiktok_credentials.json"
    privacy_level: "PUBLIC_TO_EVERYONE"
    disable_duet: false
    disable_stitch: false
    disable_comment: false

  instagram:
    enabled: false
    credentials: "meta_credentials.json"
    serve_port: 8080
    public_ip: ""

  facebook:
    enabled: false
    credentials: "meta_credentials.json"
