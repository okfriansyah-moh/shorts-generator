# Shorts Factory — Publishing Account Config
# One account.yaml per channel. Add more folders under config/accounts/ for
# additional channels — zero code changes required.
#
# paths.output_dir → output/mrkimbum12/
# paths.raw_dir    → raw/mrkimbum12/
# Drop source videos into raw/mrkimbum12/ to process for this account.

name: "mrkimbum12"
description: "Main Ninja Gaiden gameplay shorts channel"
enabled: true
min_score: 0.0    # 0.0 = publish all clips; raise to e.g. 0.7 for quality gate

# Language for AI-generated titles, descriptions, tags, and thumbnail text.
# Overrides global metadata.language in config.yaml.
# "id" → Bahasa Indonesia casual/conversational
# "en" → English
metadata:
  language: "id"

platforms:

  youtube:
    enabled: true
    credentials: "youtube_credentials.json"   # relative to this folder
    initial_visibility: "unlisted"            # unlisted → public after delay
    public_delay_minutes: 30

  tiktok:
    enabled: false
    credentials: "tiktok_credentials.json"
    privacy_level: "PUBLIC_TO_EVERYONE"       # PUBLIC_TO_EVERYONE | MUTUAL_FOLLOW_FRIENDS | SELF_ONLY
    disable_duet: false
    disable_stitch: false
    disable_comment: false

  instagram:
    enabled: false
    credentials: "meta_credentials.json"      # same file as facebook
    # Instagram requires a publicly reachable video URL.
    # Forward serve_port on your router to this machine (one-time setup).
    serve_port: 8080
    public_ip: ""                             # blank = auto-detect via api.ipify.org

  facebook:
    enabled: false
    credentials: "meta_credentials.json"      # same file as instagram
