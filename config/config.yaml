# Shorts Factory — Default Configuration
# All thresholds, paths, and tunable parameters live here.
# No hardcoded values in module code.

video_type: "gameplay" # "gameplay" (default) or "podcast"

paths:
  output_dir: "output"
  temp_dir: "output/temp"
  database: "output/shorts_factory.db"

pipeline:
  min_clip_duration: 45
  max_clip_duration: 60
  max_clips_per_run: 20
  min_clips_per_run: 5
  output_resolution: [1080, 1920]
  output_framerate: 30
  output_codec: "h264"
  ffmpeg_timeout: 300
  clip_failure_threshold: 0.5
  disk_min_free_mb: 500

ingestion:
  min_duration_seconds: 300
  max_duration_seconds: 7200
  supported_formats: ["mp4", "mkv", "avi", "mov", "webm"]

# Podcast-specific ingestion overrides (merged on top when video_type=podcast)
# Podcast episodes can be as short as 3-4 minutes; gameplay requires longer sessions
podcast_ingestion:
  min_duration_seconds: 200

scene_splitter:
  threshold: 27.0
  min_scene_duration: 3.0
  max_scene_duration: 20.0
  fallback_threshold: 27.0
  fallback_target_duration: 10.0

# Podcast-specific scene splitter overrides (merged on top when video_type=podcast)
podcast_scene_splitter:
  threshold: 20.0
  min_scene_duration: 5.0
  max_scene_duration: 30.0
  fallback_threshold: 20.0
  fallback_target_duration: 15.0

transcription:
  model_size: "small"
  language: "en"
  beam_size: 5
  model_cache_dir: "models/whisper"

face_detection:
  sample_fps: 2
  min_confidence: 0.7
  min_face_size: 0.05
  ema_alpha: 0.3
  model_path: "models/blaze_face_short_range.tflite"
  skip: false

# Podcast-specific face detection overrides (merged on top when video_type=podcast)
# Podcasts have large faces in frame — lower sampling rate, larger min face size
podcast_face_detection:
  sample_fps: 1
  min_confidence: 0.5
  min_face_size: 0.10
  ema_alpha: 0.5

scoring:
  weights:
    keyword: 3
    audio_energy: 2
    face_presence: 2
    scene_activity: 1
    sentence_density: 1
    image_quality: 2
  min_composite_score: 0.2
  # Low-res proxy dimensions for frame-level analysis (source resolution is irrelevant—FFmpeg rescales any input). Smaller = faster pure-Python computation.
  quality_frame_width: 320 # Laplacian variance probe frame width (px)
  quality_frame_height: 180 # Laplacian variance probe frame height (px)
  activity_frame_width: 64 # Frame-differencing probe frame width (px)
  activity_frame_height: 36 # Frame-differencing probe frame height (px)
  scoring_ffmpeg_timeout: 30 # Per-frame FFmpeg timeout (seconds) for scoring probes

# Podcast-specific scoring overrides (merged on top when video_type=podcast)
# Podcasts rely on speech content, not visual activity or face PiP overlays
podcast_scoring:
  weights:
    keyword: 3
    audio_energy: 2
    face_presence: 1
    scene_activity: 0
    sentence_density: 3
    image_quality: 1
  min_composite_score: 0.15

clip_builder:
  target_duration_min: 45
  target_duration_max: 60
  max_clips_per_video: 15
  min_clips_per_video: 1
  max_overlap_ratio: 0.5

hook_generator:
  max_hook_words: 15
  max_story_words: 40
  templates_per_style: 5

tts:
  engine: "edge-tts"
  voice: "en-US-AriaNeural"
  rate: "+0%"
  volume: "+0%"
  output_format: "mp3"
  sample_rate: 44100
  volume_normalization_lufs: -14

compositor:
  default_layout: "gameplay_only" # "split" (gameplay+face) or "gameplay_only"
  face_region: "middle_left" # "auto" (detect from video), or manual: "bottom_left", "bottom_center", "bottom_middle", "bottom_right", "middle_left", "middle_right", "upper_middle_left", "top_left", "top_right", "center"
  face_zoom_factor: 1.0 # 1.0 = show full PiP rectangle, no trimming
  gameplay_ratio: 0.65
  facecam_ratio: 0.35
  output_width: 1080
  output_height: 1920

# Podcast-specific compositor overrides (merged on top when video_type=podcast)
# Podcast composition crops the wide 16:9 frame to vertical 9:16 centered on speakers
podcast_compositor:
  crop_strategy: "face_follow" # legacy key — speaker detection now handled by podcast_strategy
  face_padding: 0.15 # retained for backward compat; strategy uses bbox_expand_scale
  output_width: 1080
  output_height: 1920

# Podcast speaker detection strategy (transcript-aligned, deterministic)
# Controls how the primary speaker is identified and how the crop plan is built.
podcast_strategy:
  window_seconds: 1.0 # time bucket width for text/face alignment
  text_weight: 0.7 # weight applied to normalised text score per bucket
  face_weight: 0.3 # weight applied to raw face frame presence per bucket
  cluster_threshold: 0.20 # max normalised distance to merge face centres into one cluster
  bbox_expand_scale: 1.4 # expand base 9:16 crop width by this factor for framing context

# ──────────────────────────────────────────────────────────────────────────────
# Sports video type — shared defaults (applied as layer 1 for all sports_*)
# ──────────────────────────────────────────────────────────────────────────────

sports_ingestion:
  min_duration_seconds: 120 # broadcast clips can be shorter than gameplay recordings

sports_scene_splitter:
  threshold: 30.0 # broadcast hard cuts are more abrupt than gameplay scene changes
  min_scene_duration: 3.0
  max_scene_duration: 20.0
  fallback_threshold: 30.0
  fallback_target_duration: 10.0

sports_face_detection:
  sample_fps: 1 # athletes are small and move fast; faces less useful than in podcast
  min_confidence: 0.5
  min_face_size: 0.03 # athletes occupy a small fraction of the broadcast frame
  ema_alpha: 0.3

sports_scoring:
  weights:
    keyword: 2
    audio_energy: 4 # crowd noise and commentary peaks signal exciting moments
    face_presence: 0 # athlete faces are not the primary content signal
    scene_activity: 4 # fast motion is the primary engagement signal
    sentence_density: 1
    image_quality: 2
  min_composite_score: 0.15

sports_compositor:
  default_layout: "sports_center_crop" # safe default; overridden per sport below
  output_width: 1080
  output_height: 1920

sports_strategy:
  min_face_visibility: 0.2 # lower than gameplay (0.3) — athletes appear briefly
  ema_alpha: 0.3
  pose_sample_fps: 1 # keyframes per second for MediaPipe Pose analysis
  motion_sample_fps: 2 # keyframes per second for FFmpeg motion energy analysis
  motion_thumb_width: 64 # thumbnail width for motion diff (matches scoring activity_frame_width)
  motion_thumb_height: 36 # thumbnail height for motion diff

# ── Tennis-specific overrides (layer 2 on top of sports_*) ───────────────────

sports_tennis_scene_splitter:
  min_scene_duration: 4.0 # tennis rallies are longer; avoid splitting mid-point

sports_tennis_scoring:
  weights:
    keyword: 2
    audio_energy: 3 # crowd cheers at point endings
    face_presence: 0
    scene_activity: 3
    sentence_density: 2 # commentary calls ("Ace!", "Fault") matter more in tennis
    image_quality: 2
  min_composite_score: 0.15

sports_tennis_compositor:
  default_layout: "sports_center_crop" # court is filmed from center — center crop works well

# ── Football-specific overrides (layer 2 on top of sports_*) ─────────────────

sports_football_scene_splitter:
  threshold: 25.0 # football broadcast edits more frequently than tennis
  min_scene_duration: 2.0

sports_football_scoring:
  weights:
    keyword: 2
    audio_energy: 5 # crowd roar peaks signal goals and near-misses
    face_presence: 0
    scene_activity: 5 # fast ball movement and player sprints are primary signal
    sentence_density: 1
    image_quality: 2
  min_composite_score: 0.15

sports_football_compositor:
  default_layout: "sports_action_crop" # ball and players move across full width — track them

# ── Padel-specific overrides (layer 2 on top of sports_*) ────────────────────

sports_padel_scene_splitter:
  min_scene_duration: 3.0 # padel points are shorter/faster than tennis due to wall play

sports_padel_scoring:
  weights:
    keyword: 2
    audio_energy: 3 # crowd cheers at point endings
    face_presence: 0
    scene_activity: 4 # faster exchanges than tennis via wall bounces
    sentence_density: 1
    image_quality: 2
  min_composite_score: 0.15

sports_padel_compositor:
  default_layout: "sports_center_crop" # enclosed court filmed from fixed high camera — center works well

subtitle:
  font_size: 48
  font_name: "Arial"
  outline_width: 3
  margin_bottom: 700

renderer:
  codec: "libx264"
  crf: 20
  preset: "ultrafast"
  fps: 30
  max_file_size_mb: 100
  audio_source: "original" # "original" (default) or "mixed" (original + TTS narration)
  audio_mix_gameplay: 0.7
  audio_mix_narration: 0.3

thumbnail:
  width: 1280
  height: 720
  format: "jpeg"
  quality: 90
  max_text_words: 3
  font_size: 72
  saturation_boost: 1.15
  contrast_boost: 1.10

metadata:
  # Global fallback — overridden per-account in account.yaml.
  language: "en"
  title_min_chars: 40
  title_max_chars: 60
  description_min_chars: 150
  description_max_chars: 300
  tag_count_min: 10
  tag_count_max: 15

# Claude LLM-powered metadata generation.
# Set ANTHROPIC_API_KEY in your environment to enable.
ai_metadata:
  enabled: false # Disabled — metadata is generated by Cowork Claude (no API key needed)
  model: "claude-haiku-4-5-20251001" # Only used if re-enabling direct API calls
  api_key_env: "ANTHROPIC_API_KEY"
  viral_confidence_threshold: 0.0 # 0.0–1.0; 0.0 = always use AI metadata regardless of score
  max_tokens: 1024
  temperature: 0.7

scheduler:
  # Global defaults — override per-account in account.yaml.
  max_daily_uploads: 3
  min_gap_hours: 4
  preferred_hours: [2, 7, 12]  # UTC → 09:00, 14:00, 19:00 WIB
  posts_per_day: 1
  publish_time_utc: "06:00"    # 13:00 WIB

# publisher / platforms / tiktok / meta sections have moved to per-account config.
# See config/accounts/<account-name>/account.yaml for platform credentials and
# enable/disable toggles.  The account loader merges these into the config at
# runtime so all publisher modules continue to work without changes.

# publisher.max_retries and retry_delays are kept here as global defaults;
# they can be overridden per-account if needed.
publisher:
  max_retries: 3
  retry_delays: [60, 300, 900]

# Telegram — bot_token is global (shared bot), chat_id is per-account in account.yaml.
# Set SF_TELEGRAM_BOT_TOKEN in your environment or hardcode bot_token below.
telegram:
  enabled: true
  bot_token_env: "SF_TELEGRAM_BOT_TOKEN"
  chat_id_env: "SF_TELEGRAM_CHAT_ID"
  bot_token: ""  # set SF_TELEGRAM_BOT_TOKEN env var instead

channel:
  # Global fallback — override per-account in account.yaml.
  name: ""
  hashtags: []
  static_tags: []

retry:
  max_attempts: 3
  per_stage_max: 2

# GPU acceleration (NVIDIA only) — optional, defaults to CPU-only mode.
# Enable with gpu.enabled: true or CLI --gpu flag.
# Requires: NVIDIA GPU, nvidia-smi, FFmpeg compiled with --enable-nvenc.
# For transcription CUDA mode, PyTorch with CUDA support is also required.
gpu:
  enabled: false
  encoder: "h264_nvenc"
  preset: "p4" # p1 (fastest) to p7 (slowest/best quality)
  rc: "vbr" # rate control mode
  cq: 20 # constant quality (lower = better, 0-51)
  cq_fallback: 28 # fallback quality for retries
  spatial_aq: 1 # spatial adaptive quantization (0 or 1)
  temporal_aq: 1 # temporal adaptive quantization (0 or 1)
  aq_strength: 8 # AQ strength (1-15)
  rc_lookahead: 20 # lookahead frames for rate control
  maxrate: "10M" # max bitrate
  bufsize: "20M" # VBV buffer size
  profile: "high" # H.264 profile
  pix_fmt: "yuv420p" # pixel format
  transcription_device: "cuda"
  transcription_compute_type: "float16"
